  <body>
    <div id="root"></div>
    
    <!-- Web Vitals Performance Monitoring -->
    <script>
      // Measure Core Web Vitals (LCP, FCP, CLS)
      if ('PerformanceObserver' in window) {
        // LCP - Largest Contentful Paint
        const lcpObserver = new PerformanceObserver((list) => {
          const entries = list.getEntries();
          const lastEntry = entries[entries.length - 1];
          console.log('🎯 LCP (Largest Contentful Paint):', Math.round(lastEntry.renderTime || lastEntry.loadTime), 'ms');
        });
        lcpObserver.observe({ entryTypes: ['largest-contentful-paint'] });
        
        // FCP - First Contentful Paint
        const fcpObserver = new PerformanceObserver((list) => {
          const entries = list.getEntries();
          console.log('⚡ FCP (First Contentful Paint):', Math.round(entries[0].startTime), 'ms');
        });
        fcpObserver.observe({ entryTypes: ['paint'] });
        
        // CLS - Cumulative Layout Shift
        let clsValue = 0;
        const clsObserver = new PerformanceObserver((list) => {
          for (const entry of list.getEntries()) {
            if (!entry.hadRecentInput) {
              clsValue += entry.value;
              console.log('📏 CLS (Cumulative Layout Shift):', clsValue.toFixed(3));
            }
          }
        });
        clsObserver.observe({ entryTypes: ['layout-shift'] });
      }
      
      // Log when page is fully interactive
      window.addEventListener('load', () => {
        const perfData = performance.timing;
        const pageLoadTime = perfData.loadEventEnd - perfData.navigationStart;
        console.log('✅ Page fully loaded:', pageLoadTime, 'ms');
      });
    </script>
